<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntegriTest - Avaliacao de Integridade Comportamental</title>
  <meta name="description" content="Teste sua integridade e honestidade com 7 cenarios reais. Receba seu certificado oficial." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#08080f;overflow-x:hidden}
    .fi{animation:fu .5s ease-out forwards}.fo{animation:fO .35s ease-in forwards}
    @keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fO{from{opacity:1}to{opacity:0;transform:translateY(-12px)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,170,120,.25)}50%{box-shadow:0 0 0 14px rgba(200,170,120,0)}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes scIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    @keyframes bG{from{width:0%}}
    @keyframes sp{to{transform:rotate(360deg)}}
    .gt{background:linear-gradient(90deg,#c8aa78,#e8d5b0,#c8aa78);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
    .ef{animation:float 3s ease-in-out infinite}
    .ob{width:100%;text-align:left;padding:16px 20px;border:1.5px solid rgba(200,170,120,.12);border-radius:14px;background:rgba(255,255,255,.02);color:#d4d0c8;font-family:'DM Sans',sans-serif;font-size:14.5px;line-height:1.55;cursor:pointer;transition:all .3s}
    .ob:hover:not(.sl):not(.ds){border-color:rgba(200,170,120,.45);background:rgba(200,170,120,.06);transform:translateX(4px)}
    .ob.sl{border-color:rgba(200,170,120,.65);background:rgba(200,170,120,.1)}
    .ob.ds{cursor:default;opacity:.45}.ob.ds.sl{opacity:1}
    .ni{width:100%;padding:16px 20px;border:1.5px solid rgba(200,170,120,.2);border-radius:12px;background:rgba(255,255,255,.03);color:#e8d5b0;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;text-align:center;outline:none;transition:all .3s;letter-spacing:.02em}
    .ni::placeholder{color:rgba(200,170,120,.25);font-weight:400}
    .ni:focus{border-color:rgba(200,170,120,.55);background:rgba(200,170,120,.04)}
    .ni.er{border-color:rgba(239,68,68,.6)}
    .pb{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:15px 44px;border:none;border-radius:50px;background:linear-gradient(135deg,#c8aa78,#a68b5c);color:#0a0a0f;cursor:pointer;letter-spacing:.05em;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
    .pb:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,170,120,.2)}
    .pb:disabled{opacity:.6;cursor:wait}
    .gb{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:13px 36px;border:1.5px solid rgba(200,170,120,.3);border-radius:50px;background:transparent;color:#c8aa78;cursor:pointer;letter-spacing:.04em;transition:all .3s}
    .gb:hover{background:rgba(200,170,120,.08);border-color:rgba(200,170,120,.55)}
    .ps{height:4px;border-radius:2px;flex:1;transition:background .5s}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(200,170,120,.2);border-radius:2px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const questions = [
      {
        id: 1, scenario: "O Troco Errado", icon: "\u{1F4B0}",
        situation: "Voce compra um cafe de R$8 e paga com uma nota de R$20. O caixa, visivelmente cansado apos um turno longo, te devolve R$32 de troco \u2014 ele confundiu sua nota de R$20 com uma de R$50. Ninguem mais percebeu.",
        options: [
          { text: "Devolvo o troco excedente imediatamente e aviso o caixa do engano.", score: 10, feedback: "Atitude exemplar! Honestidade mesmo quando ninguem esta olhando e a forma mais pura de integridade." },
          { text: "Fico com o dinheiro, mas me sinto um pouco culpado depois.", score: 3, feedback: "A culpa mostra que voce sabe o certo, mas nao agiu conforme sua consciencia." },
          { text: "Devolvo, mas so porque tenho medo de cameras de seguranca.", score: 5, feedback: "Voce fez o certo, mas a motivacao foi o medo, nao a integridade genuina." },
          { text: "Guardo o dinheiro \u2014 o erro foi do caixa, nao meu.", score: 1, feedback: "Transferir a responsabilidade nao muda o fato: o dinheiro nao e seu." },
        ],
      },
      {
        id: 2, scenario: "O Curriculo Turbinado", icon: "\u{1F4C4}",
        situation: "Voce esta concorrendo a vaga dos sonhos. Seu curriculo e bom, mas um colega sugere que voce adicione uma certificacao que nao possui \u2014 ele diz que 'todo mundo faz isso' e que ninguem verifica.",
        options: [
          { text: "Recuso e envio meu curriculo real, mesmo arriscando perder a vaga.", score: 10, feedback: "Integridade e manter seus valores mesmo quando o custo e alto. Admiravel." },
          { text: "Nao coloco a certificacao falsa, mas exagero bastante minhas experiencias reais.", score: 4, feedback: "Exagerar e uma forma mais sutil de desonestidade, mas ainda e desonestidade." },
          { text: "Coloco a certificacao, planejando obte-la de verdade depois se for contratado.", score: 3, feedback: "Boas intencoes futuras nao justificam uma mentira presente." },
          { text: "Coloco a certificacao sem pensar duas vezes \u2014 o mercado e competitivo demais.", score: 1, feedback: "Justificar desonestidade pela pressao externa e um caminho perigoso." },
        ],
      },
      {
        id: 3, scenario: "O Segredo do Amigo", icon: "\u{1F92B}",
        situation: "Seu melhor amigo te conta em sigilo que esta traindo a esposa. Dias depois, a esposa dele \u2014 que tambem e sua amiga \u2014 te pergunta diretamente se voce sabe de algo estranho no comportamento do marido.",
        options: [
          { text: "Digo que nao sei de nada para proteger meu amigo.", score: 3, feedback: "Lealdade e importante, mas mentir ativamente para encobrir algo errado e problematico." },
          { text: "Sugiro que ela converse diretamente com o marido, sem confirmar nem negar nada.", score: 8, feedback: "Resposta sabia \u2014 voce nao trai a confianca, mas direciona para a verdade." },
          { text: "Conto tudo \u2014 ela merece saber a verdade e esta me perguntando diretamente.", score: 6, feedback: "A honestidade e valida, mas quebrar a confianca de quem confiou em voce tem peso moral." },
          { text: "Falo com meu amigo primeiro e dou um prazo para ele contar, senao eu conto.", score: 9, feedback: "Equilibra responsabilidade, lealdade e honestidade de forma madura e corajosa." },
        ],
      },
      {
        id: 4, scenario: "O Erro no Trabalho", icon: "\u{1F4BC}",
        situation: "Voce comete um erro grave num relatorio que ja foi enviado ao cliente. Seu chefe ainda nao percebeu, e se voce ficar quieto, e possivel que ninguem nunca descubra. Mas se descobrirem, o impacto pode ser grande.",
        options: [
          { text: "Assumo o erro imediatamente e proponho uma solucao ao meu chefe.", score: 10, feedback: "Coragem e responsabilidade \u2014 as marcas de um profissional integro e confiavel." },
          { text: "Tento corrigir sozinho em silencio, sem contar a ninguem.", score: 5, feedback: "A iniciativa e boa, mas esconder erros pode criar problemas maiores no futuro." },
          { text: "Espero para ver se alguem percebe antes de me manifestar.", score: 2, feedback: "Esperar e torcer e jogar com a sorte \u2014 nao e responsabilidade." },
          { text: "Dou um jeito de fazer parecer que o erro foi de outra pessoa.", score: 0, feedback: "Culpar outros pelo seu erro e uma das formas mais graves de desonestidade profissional." },
        ],
      },
      {
        id: 5, scenario: "A Carteira Perdida", icon: "\u{1F45B}",
        situation: "Voce encontra uma carteira no chao do shopping com R$2.000 em dinheiro, cartoes e documentos. O dono e identificavel pelos documentos. Voce esta passando por dificuldades financeiras serias.",
        options: [
          { text: "Entrego a carteira completa na administracao do shopping ou diretamente ao dono.", score: 10, feedback: "Integridade real aparece justamente nos momentos de maior tentacao." },
          { text: "Devolvo os documentos e cartoes, mas fico com o dinheiro \u2014 ninguem vai provar.", score: 2, feedback: "Devolver parcialmente nao compensa a decisao de ficar com o que nao e seu." },
          { text: "Devolvo tudo, mas confesso que pensei em ficar com o dinheiro por causa da minha situacao.", score: 9, feedback: "Ser honesto inclusive sobre suas tentacoes mostra autoconhecimento admiravel." },
          { text: "Fico com tudo \u2014 preciso mais do dinheiro do que essa pessoa.", score: 0, feedback: "Necessidade pessoal nao justifica se apropriar do que pertence a outro." },
        ],
      },
      {
        id: 6, scenario: "A Cola na Prova", icon: "\u{1F4DD}",
        situation: "Na prova final da faculdade, que vale sua aprovacao, voce percebe que o colega ao lado deixou a folha totalmente visivel. As respostas dele parecem corretas e o fiscal nao esta prestando atencao.",
        options: [
          { text: "Faco minha prova com o que sei, mesmo arriscando reprovar.", score: 10, feedback: "O valor do diploma vem do que voce realmente sabe, nao da nota no papel." },
          { text: "Dou uma olhadinha rapida em uma ou duas questoes que nao sei.", score: 3, feedback: "'So uma olhadinha' e exatamente como a desonestidade sempre comeca \u2014 pequena." },
          { text: "Nao colo, mas peco para ir ao banheiro e consulto o celular escondido.", score: 1, feedback: "Mudar o metodo nao muda a natureza do ato \u2014 continua sendo fraude academica." },
          { text: "Aviso discretamente o colega para que ele cubra a prova \u2014 protejo a integridade de ambos.", score: 9, feedback: "Alem de nao colar, voce ainda protegeu o colega. Atitude rara e admiravel." },
        ],
      },
      {
        id: 7, scenario: "A Promessa Dificil", icon: "\u{1F91D}",
        situation: "Voce prometeu ajudar um amigo na mudanca no sabado. Mas na sexta a noite, voce recebe um convite para uma festa incrivel que sempre quis ir, no mesmo horario. Seu amigo esta contando com voce e ja recusou ajuda de outros.",
        options: [
          { text: "Cumpro minha promessa \u2014 dei minha palavra e meu amigo conta comigo.", score: 10, feedback: "Sua palavra e seu maior patrimonio. Cumprir promessas define carater." },
          { text: "Invento uma desculpa convincente (doenca, emergencia) e vou a festa.", score: 1, feedback: "Mentir para quebrar uma promessa e desonestidade dupla \u2014 com o outro e consigo mesmo." },
          { text: "Sou honesto, digo que surgiu algo e peco desculpas, tentando achar alguem para me substituir.", score: 6, feedback: "A honestidade e boa, mas quebrar promessas por conveniencia tem um custo relacional." },
          { text: "Ajudo na mudanca de manha cedo e vou a festa depois, mesmo que signifique um dia exaustivo.", score: 8, feedback: "Criativo e responsavel \u2014 voce encontrou um jeito de honrar seu compromisso sem abrir mao de tudo." },
        ],
      },
    ];

    const getVerdict = (score) => {
      if (score >= 9) return { title: "Integridade Inabalavel", classification: "Alta Integridade", emoji: "\u{1F3C6}", desc: "Voce e um exemplo raro de honestidade e carater. Suas acoes refletem valores solidos mesmo sob pressao intensa. As pessoas ao seu redor podem confiar em voce de olhos fechados.", color: "#10b981", traits: ["Demonstra consistencia absoluta entre discurso e acao", "Apresenta responsabilidade exemplar em decisoes criticas", "Mantem postura etica em todos os cenarios analisados", "Resiste a pressoes externas com firmeza e conviccao"] };
      if (score >= 7) return { title: "Consciencia Ativa", classification: "Perfil Confiavel", emoji: "\u2728", desc: "Voce tem uma bussola moral forte e geralmente faz a coisa certa. Em alguns momentos a tentacao pode pesar, mas sua consciencia costuma vencer. Continue cultivando essa integridade!", color: "#3b82f6", traits: ["Demonstra consistencia entre discurso e acao na maioria dos cenarios", "Apresenta responsabilidade em decisoes criticas", "Mantem postura etica na maioria dos cenarios analisados", "Pode apresentar pontos de atencao sob pressao externa extrema"] };
      if (score >= 5) return { title: "Em Construcao", classification: "Nivel Moderado", emoji: "\u{1F528}", desc: "Voce reconhece o que e certo, mas nem sempre age conforme seus valores. A boa noticia: autoconsciencia e o primeiro passo. Reflita sobre o que te impede de agir com mais integridade.", color: "#f59e0b", traits: ["Reconhece padroes eticos mas apresenta inconsistencias na aplicacao", "Demonstra responsabilidade parcial em decisoes criticas", "Apresenta vulnerabilidade a pressoes externas e conveniencia", "Possui potencial de desenvolvimento com reflexao e pratica"] };
      if (score >= 3) return { title: "Zona de Alerta", classification: "Em Desenvolvimento", emoji: "\u26A0\uFE0F", desc: "Suas respostas indicam que conveniencia e autopreservacao frequentemente vencem seus valores. Isso pode parecer funcional agora, mas mina a confianca dos outros e sua paz interior.", color: "#f97316", traits: ["Apresenta divergencia frequente entre valores declarados e acoes", "Tende a priorizar conveniencia sobre principios eticos", "Demonstra vulnerabilidade significativa a pressoes externas", "Necessita de reflexao profunda sobre alinhamento de valores e comportamento"] };
      return { title: "Reflexao Urgente", classification: "Perfil Critico", emoji: "\u{1FA9E}", desc: "Este resultado e um chamado para uma reflexao profunda. Integridade se constroi com escolhas diarias. Nunca e tarde para recomecar e alinhar suas acoes com a pessoa que voce quer ser.", color: "#ef4444", traits: ["Apresenta padrao consistente de escolhas baseadas em interesse proprio", "Demonstra dificuldade em manter compromissos eticos sob pressao", "Tende a racionalizar comportamentos desonestos", "Requer atencao imediata ao desenvolvimento de valores e responsabilidade"] };
    };

    const genCode = () => {
      const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let r = "INT-";
      for (let i = 0; i < 4; i++) r += c[Math.floor(Math.random() * c.length)];
      r += "-";
      for (let i = 0; i < 4; i++) r += c[Math.floor(Math.random() * c.length)];
      return r;
    };

    const fmtDate = () => {
      const d = new Date();
      const m = ["janeiro","fevereiro","marco","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
      return d.getDate() + " de " + m[d.getMonth()] + " de " + d.getFullYear();
    };

    function IntegrityTest() {
      const [phase, setPhase] = useState("intro");
      const [currentQ, setCurrentQ] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showFeedback, setShowFeedback] = useState(false);
      const [animating, setAnimating] = useState(false);
      const [fadeIn, setFadeIn] = useState(true);
      const [introStep, setIntroStep] = useState(0);
      const [userName, setUserName] = useState("");
      const [nameError, setNameError] = useState(false);
      const [generatingPdf, setGeneratingPdf] = useState(false);
      const [validationCode] = useState(genCode());

      const totalScore = answers.length > 0 ? answers.reduce(function(s, a) { return s + a.score; }, 0) / answers.length : 0;

      useEffect(function() {
        if (phase === "intro") {
          const t = [
            setTimeout(function() { setIntroStep(1); }, 400),
            setTimeout(function() { setIntroStep(2); }, 900),
            setTimeout(function() { setIntroStep(3); }, 1400),
            setTimeout(function() { setIntroStep(4); }, 1900)
          ];
          return function() { t.forEach(clearTimeout); };
        }
      }, [phase]);

      const handleSelect = function(opt, idx) {
        if (showFeedback || animating) return;
        setSelectedOption(idx);
        setShowFeedback(true);
        setAnswers(function(p) { return [...p, { questionId: currentQ, score: opt.score, feedback: opt.feedback }]; });
      };

      const handleNext = function() {
        if (animating) return;
        setAnimating(true); setFadeIn(false);
        setTimeout(function() {
          if (currentQ < questions.length - 1) { setCurrentQ(function(p) { return p + 1; }); setSelectedOption(null); setShowFeedback(false); }
          else { setPhase("result"); }
          setFadeIn(true); setAnimating(false);
        }, 400);
      };

      const restart = function() {
        setAnimating(true); setFadeIn(false);
        setTimeout(function() {
          setPhase("intro"); setCurrentQ(0); setAnswers([]); setSelectedOption(null); setShowFeedback(false);
          setIntroStep(0); setUserName(""); setNameError(false); setFadeIn(true); setAnimating(false);
          setTimeout(function() { setIntroStep(1); }, 400);
          setTimeout(function() { setIntroStep(2); }, 900);
          setTimeout(function() { setIntroStep(3); }, 1400);
          setTimeout(function() { setIntroStep(4); }, 1900);
        }, 400);
      };

      const startQuiz = function() {
        if (!userName.trim() || userName.trim().length < 3) { setNameError(true); return; }
        setNameError(false); setPhase("quiz"); setFadeIn(true);
      };

      const generateCertificate = function() {
        setGeneratingPdf(true);
        const v = getVerdict(totalScore);
        const dateStr = fmtDate();

        setTimeout(function() {
          try {
            const canvas = document.createElement("canvas");
            const scale = 3;
            const W = 794 * scale;
            const H = 1123 * scale;
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext("2d");
            ctx.scale(scale, scale);
            const w = 794, h = 1123;

            ctx.fillStyle = "#0a0a12";
            ctx.fillRect(0, 0, w, h);

            const grd = ctx.createRadialGradient(w/2, h*0.35, 50, w/2, h*0.35, 500);
            grd.addColorStop(0, "rgba(200,170,120,0.04)");
            grd.addColorStop(1, "transparent");
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = "#b49b6e";
            ctx.lineWidth = 3;
            ctx.strokeRect(36, 36, w - 72, h - 72);

            ctx.strokeStyle = "rgba(200,170,120,0.4)";
            ctx.lineWidth = 1;
            ctx.strokeRect(44, 44, w - 88, h - 88);

            var cs = 24;
            [[44,44,1,1],[w-44,44,-1,1],[44,h-44,1,-1],[w-44,h-44,-1,-1]].forEach(function(c2) {
              ctx.strokeStyle = "#c8aa78"; ctx.lineWidth = 2;
              ctx.beginPath(); ctx.moveTo(c2[0], c2[1]); ctx.lineTo(c2[0] + cs * c2[2], c2[1]); ctx.stroke();
              ctx.beginPath(); ctx.moveTo(c2[0], c2[1]); ctx.lineTo(c2[0], c2[1] + cs * c2[3]); ctx.stroke();
            });

            var yy = 96;
            ctx.strokeStyle = "#c8aa78"; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(80, yy); ctx.lineTo(w/2 - 40, yy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(w/2 + 40, yy); ctx.lineTo(w - 80, yy); ctx.stroke();
            ctx.fillStyle = "#c8aa78";
            ctx.beginPath();
            ctx.moveTo(w/2, yy - 8); ctx.lineTo(w/2 + 8, yy); ctx.lineTo(w/2, yy + 8); ctx.lineTo(w/2 - 8, yy); ctx.closePath();
            ctx.fill();

            yy = 138;
            ctx.fillStyle = "#c8aa78";
            ctx.font = "600 28px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("CERTIFICADO DE AVALIACAO DE", w/2, yy);

            yy += 42;
            ctx.fillStyle = "#e2d4b0";
            ctx.font = "700 42px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("INTEGRIDADE COMPORTAMENTAL", w/2, yy);

            yy += 28;
            ctx.strokeStyle = "rgba(200,170,120,0.5)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(200, yy); ctx.lineTo(w - 200, yy); ctx.stroke();

            yy += 36;
            ctx.fillStyle = "#a8a298";
            ctx.font = "400 24px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Certificamos que:", w/2, yy);

            yy += 48;
            ctx.fillStyle = "#e8d8b8";
            ctx.font = "700 44px 'Segoe UI', 'DM Sans', sans-serif";
            var nameText = userName.toUpperCase();
            ctx.fillText(nameText, w/2, yy);
            var nw = ctx.measureText(nameText).width;
            ctx.strokeStyle = "#c8aa78"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(w/2 - nw/2 - 16, yy + 10); ctx.lineTo(w/2 + nw/2 + 16, yy + 10); ctx.stroke();

            yy += 46;
            ctx.fillStyle = "#9a958c";
            ctx.font = "400 20px 'Segoe UI', 'DM Sans', sans-serif";
            var bodyLines = [
              "concluiu o processo de avaliacao comportamental por meio da plataforma",
              "IntegriTest, baseado em criterios estruturados de analise de integridade,",
              "coerencia e tomada de decisao em cenarios simulados.",
              "",
              "Apos responder ao questionario e passar pelo sistema de analise,",
              "o participante obteve o seguinte resultado:"
            ];
            bodyLines.forEach(function(line) { ctx.fillText(line, w/2, yy); yy += 26; });

            yy += 14;
            var boxX = 110, boxW = w - 220, boxH = 110;
            ctx.fillStyle = "#12121c"; ctx.strokeStyle = "#c8aa78"; ctx.lineWidth = 2;
            var roundRect = function(x, y, w2, h2, r) {
              ctx.beginPath();
              ctx.moveTo(x + r, y); ctx.lineTo(x + w2 - r, y); ctx.quadraticCurveTo(x + w2, y, x + w2, y + r);
              ctx.lineTo(x + w2, y + h2 - r); ctx.quadraticCurveTo(x + w2, y + h2, x + w2 - r, y + h2);
              ctx.lineTo(x + r, y + h2); ctx.quadraticCurveTo(x, y + h2, x, y + h2 - r);
              ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
            };
            roundRect(boxX, yy, boxW, boxH, 10);
            ctx.fill(); ctx.stroke();

            var leftCenter = boxX + boxW * 0.28;
            ctx.fillStyle = "#c8aa78";
            ctx.font = "600 18px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Pontuacao Final", leftCenter, yy + 30);
            ctx.fillStyle = v.color;
            ctx.font = "700 64px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText(totalScore.toFixed(1), leftCenter - 12, yy + 82);
            ctx.fillStyle = "#7a756c";
            ctx.font = "400 22px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("/ 10", leftCenter + 42, yy + 80);

            ctx.strokeStyle = "rgba(200,170,120,0.25)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(boxX + boxW * 0.5, yy + 16); ctx.lineTo(boxX + boxW * 0.5, yy + boxH - 16); ctx.stroke();

            var rightCenter = boxX + boxW * 0.75;
            ctx.fillStyle = "#c8aa78";
            ctx.font = "600 18px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Classificacao", rightCenter, yy + 30);
            ctx.fillStyle = "#e0d5c0";
            ctx.font = "700 30px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText(v.classification, rightCenter, yy + 72);

            yy += boxH + 36;
            ctx.fillStyle = "#c8aa78";
            ctx.font = "700 24px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Resumo do Perfil Comportamental", w/2, yy);
            yy += 8;
            ctx.strokeStyle = "rgba(200,170,120,0.5)"; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.moveTo(w/2 - 120, yy); ctx.lineTo(w/2 + 120, yy); ctx.stroke();
            yy += 24;

            ctx.textAlign = "left";
            ctx.font = "400 19px 'Segoe UI', 'DM Sans', sans-serif";
            v.traits.forEach(function(trait) {
              ctx.fillStyle = "#c8aa78";
              ctx.beginPath(); ctx.arc(94, yy - 5, 4, 0, Math.PI * 2); ctx.fill();
              ctx.fillStyle = "#9a958c";
              ctx.fillText(trait, 110, yy);
              yy += 30;
            });

            yy += 16;
            ctx.textAlign = "center";
            ctx.fillStyle = "#c8aa78";
            ctx.font = "700 22px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Desempenho por Cenario", w/2, yy);
            yy += 22;

            ctx.textAlign = "left";
            answers.forEach(function(a, i) {
              var q2 = questions[i];
              ctx.fillStyle = "#858078";
              ctx.font = "400 18px 'Segoe UI', 'DM Sans', sans-serif";
              ctx.fillText(q2.scenario, 80, yy);

              var barX2 = w - 220, barW2 = 120;
              ctx.fillStyle = "#1c1c26";
              roundRect(barX2, yy - 11, barW2, 14, 4); ctx.fill();

              var fillW2 = (a.score / 10) * barW2;
              ctx.fillStyle = a.score >= 8 ? "#10b981" : a.score >= 5 ? "#f59e0b" : "#ef4444";
              if (fillW2 > 0) { roundRect(barX2, yy - 11, fillW2, 14, 4); ctx.fill(); }

              ctx.fillStyle = "#c0bab0";
              ctx.font = "700 18px 'Segoe UI', 'DM Sans', sans-serif";
              ctx.textAlign = "right";
              ctx.fillText("" + a.score, w - 72, yy);
              ctx.textAlign = "left";
              yy += 26;
            });

            yy += 14;
            ctx.strokeStyle = "rgba(200,170,120,0.2)"; ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(80, yy); ctx.lineTo(w - 80, yy); ctx.stroke();
            yy += 22;
            ctx.textAlign = "center";
            ctx.fillStyle = "#6a655c";
            ctx.font = "italic 15px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Este certificado representa uma analise baseada em padroes comportamentais e nao deve", w/2, yy);
            ctx.fillText("ser considerado como julgamento absoluto de carater, mas sim como um indicador", w/2, yy + 20);
            ctx.fillText("tecnico de tendencias de comportamento.", w/2, yy + 40);

            yy = h - 100;
            ctx.strokeStyle = "rgba(200,170,120,0.4)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(80, yy); ctx.lineTo(w - 80, yy); ctx.stroke();
            yy += 24;
            ctx.textAlign = "left";
            ctx.fillStyle = "#8a857c";
            ctx.font = "400 17px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Data de emissao: " + dateStr, 80, yy);
            ctx.textAlign = "right";
            ctx.fillText("Codigo de validacao: " + validationCode, w - 80, yy);
            yy += 32;
            ctx.textAlign = "center";
            ctx.fillStyle = "#c8aa78";
            ctx.font = "700 26px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("IntegriTest", w/2, yy);
            yy += 22;
            ctx.fillStyle = "#706b62";
            ctx.font = "400 16px 'Segoe UI', 'DM Sans', sans-serif";
            ctx.fillText("Sistema de Avaliacao Comportamental e Integridade", w/2, yy);

            var link = document.createElement("a");
            link.download = "Certificado_IntegriTest_" + userName.replace(/\s+/g, "_") + ".png";
            link.href = canvas.toDataURL("image/png", 1.0);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          } catch (e) {
            console.error("Erro:", e);
            alert("Erro ao gerar o certificado. Tente novamente.");
          }
          setGeneratingPdf(false);
        }, 200);
      };

      var q = questions[currentQ];
      var verdict = getVerdict(totalScore);

      return (
        <div style={{ minHeight: "100vh", background: "#08080f", fontFamily: "'Segoe UI', sans-serif", color: "#e8e6e1" }}>
          <div style={{ position: "fixed", inset: 0, zIndex: 0, background: "radial-gradient(ellipse at 15% 15%,rgba(200,170,120,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(120,100,70,.03) 0%,transparent 55%)" }} />
          <div style={{ position: "fixed", inset: 0, zIndex: 0, backgroundImage: "url(\"data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23c8aa78' stroke-opacity='0.025' stroke-width='0.5'/%3E%3C/svg%3E\")" }} />

          <div style={{ position: "relative", zIndex: 1, maxWidth: 640, margin: "0 auto", padding: "28px 18px", minHeight: "100vh", display: "flex", flexDirection: "column" }}>

            {phase === "intro" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 22 }}>
                <div style={{ opacity: introStep >= 1 ? 1 : 0, transform: introStep >= 1 ? "translateY(0)" : "translateY(20px)", transition: "all .7s", fontSize: 52 }} className="ef">{"\u2696\uFE0F"}</div>
                <div style={{ opacity: introStep >= 1 ? 1 : 0, transform: introStep >= 1 ? "translateY(0)" : "translateY(20px)", transition: "all .7s", textAlign: "center" }}>
                  <h1 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(30px,7vw,46px)", fontWeight: 700, lineHeight: 1.1, letterSpacing: "-.02em", marginBottom: 6 }}>
                    <span className="gt">IntegriTest</span>
                  </h1>
                  <p style={{ fontFamily: "'DM Sans'", fontSize: 12, color: "rgba(200,170,120,.5)", letterSpacing: ".2em", textTransform: "uppercase" }}>Avaliacao Comportamental &middot; 7 Cenarios &middot; Nota 0 a 10</p>
                </div>
                <p style={{ opacity: introStep >= 2 ? 1 : 0, transform: introStep >= 2 ? "translateY(0)" : "translateY(20px)", transition: "all .7s", textAlign: "center", maxWidth: 400, fontFamily: "'DM Sans'", fontSize: 14.5, lineHeight: 1.7, color: "rgba(228,222,212,.55)" }}>
                  Enfrente <strong style={{ color: "#c8aa78" }}>7 dilemas reais</strong> que testam honestidade, lealdade e carater. Ao final, receba seu <strong style={{ color: "#c8aa78" }}>certificado oficial</strong> com analise completa do seu perfil.
                </p>
                <div style={{ opacity: introStep >= 3 ? 1 : 0, transform: introStep >= 3 ? "translateY(0)" : "translateY(20px)", transition: "all .7s", width: "100%", maxWidth: 380, display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
                  <label style={{ fontFamily: "'DM Sans'", fontSize: 11, color: "rgba(200,170,120,.45)", letterSpacing: ".15em", textTransform: "uppercase", alignSelf: "flex-start", marginLeft: 4 }}>Seu nome completo</label>
                  <input className={"ni " + (nameError ? "er" : "")} type="text" placeholder="Digite seu nome aqui..." value={userName} onChange={function(e) { setUserName(e.target.value); setNameError(false); }} onKeyDown={function(e) { if (e.key === "Enter") startQuiz(); }} maxLength={60} />
                  {nameError && <span style={{ fontFamily: "'DM Sans'", fontSize: 12, color: "#ef4444" }}>Por favor, informe seu nome completo (minimo 3 caracteres)</span>}
                </div>
                <button className="pb" onClick={startQuiz} style={{ opacity: introStep >= 4 ? 1 : 0, transform: introStep >= 4 ? "scale(1)" : "scale(.9)", transition: "all .5s", animation: introStep >= 4 ? "pulse 2s infinite" : "none" }}>
                  INICIAR AVALIACAO
                </button>
              </div>
            )}

            {phase === "quiz" && (
              <div className={fadeIn ? "fi" : "fo"} style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                <div style={{ display: "flex", gap: 5, marginBottom: 22 }}>
                  {questions.map(function(_, i) { return <div key={i} className="ps" style={{ background: i < currentQ ? "rgba(200,170,120,.65)" : i === currentQ ? "linear-gradient(90deg,#c8aa78,#a68b5c)" : "rgba(255,255,255,.07)" }} />; })}
                </div>
                <div style={{ marginBottom: 18 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <span style={{ fontSize: 26 }}>{q.icon}</span>
                    <div>
                      <span style={{ fontFamily: "'DM Sans'", fontSize: 10, fontWeight: 600, color: "rgba(200,170,120,.45)", letterSpacing: ".2em", textTransform: "uppercase" }}>Cenario {currentQ + 1} de 7</span>
                      <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 22, fontWeight: 700, color: "#c8aa78", lineHeight: 1.2 }}>{q.scenario}</h2>
                    </div>
                  </div>
                  <p style={{ fontFamily: "'DM Sans'", fontSize: 14.5, lineHeight: 1.7, color: "rgba(228,222,212,.7)", padding: "14px 18px", background: "rgba(200,170,120,.035)", borderRadius: 12, borderLeft: "3px solid rgba(200,170,120,.25)" }}>{q.situation}</p>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 18 }}>
                  {q.options.map(function(opt, i) {
                    return (
                      <button key={i} className={"ob " + (selectedOption === i ? "sl " : "") + (showFeedback && selectedOption !== i ? "ds" : "")} onClick={function() { handleSelect(opt, i); }}>
                        <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 24, height: 24, borderRadius: "50%", marginRight: 12, float: "left", marginTop: 1, border: selectedOption === i ? "2px solid #c8aa78" : "1.5px solid rgba(200,170,120,.2)", background: selectedOption === i ? "rgba(200,170,120,.15)" : "transparent", fontSize: 11, fontWeight: 700, color: "#c8aa78", transition: "all .3s", flexShrink: 0 }}>{String.fromCharCode(65 + i)}</span>
                        {opt.text}
                      </button>
                    );
                  })}
                </div>
                {showFeedback && (
                  <div style={{ animation: "scIn .4s ease-out", padding: "16px 20px", borderRadius: 14, background: "rgba(200,170,120,.06)", border: "1px solid rgba(200,170,120,.18)", marginBottom: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <span style={{ fontFamily: "'DM Sans'", fontSize: 12, fontWeight: 700, color: "#c8aa78", letterSpacing: ".08em", textTransform: "uppercase" }}>
                        {answers[answers.length - 1] && answers[answers.length - 1].score >= 8 ? "\u{1F31F} Excelente" : answers[answers.length - 1] && answers[answers.length - 1].score >= 5 ? "\u{1F4AD} Reflexao" : "\u26A1 Atencao"}
                      </span>
                      <span style={{ fontFamily: "'DM Sans'", fontSize: 11, color: "rgba(200,170,120,.45)", marginLeft: "auto" }}>+{answers[answers.length - 1] && answers[answers.length - 1].score} pts</span>
                    </div>
                    <p style={{ fontFamily: "'DM Sans'", fontSize: 13.5, lineHeight: 1.6, color: "rgba(228,222,212,.65)" }}>{answers[answers.length - 1] && answers[answers.length - 1].feedback}</p>
                  </div>
                )}
                {showFeedback && (
                  <div style={{ animation: "scIn .3s ease-out .1s both" }}>
                    <button className="pb" onClick={handleNext} style={{ width: "100%" }}>
                      {currentQ < questions.length - 1 ? "PROXIMO CENARIO \u2192" : "VER RESULTADO FINAL \u2192"}
                    </button>
                  </div>
                )}
              </div>
            )}

            {phase === "result" && (
              <div className={fadeIn ? "fi" : "fo"} style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", gap: 20, paddingBottom: 32 }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 52, marginBottom: 6 }} className="ef">{verdict.emoji}</div>
                  <h2 style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: "clamp(24px,5vw,34px)", fontWeight: 700, lineHeight: 1.15 }}>
                    <span className="gt">{verdict.title}</span>
                  </h2>
                  <p style={{ fontFamily: "'DM Sans'", fontSize: 13, color: "rgba(200,170,120,.5)", marginTop: 4 }}>{userName}</p>
                </div>

                <div style={{ textAlign: "center", padding: "22px 18px", borderRadius: 18, background: "rgba(200,170,120,.04)", border: "1px solid rgba(200,170,120,.12)" }}>
                  <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 54, fontWeight: 700, color: verdict.color, lineHeight: 1 }}>{totalScore.toFixed(1)}</div>
                  <div style={{ fontFamily: "'DM Sans'", fontSize: 11, color: "rgba(200,170,120,.4)", letterSpacing: ".15em", textTransform: "uppercase", marginTop: 2 }}>de 10 pontos</div>
                  <div style={{ marginTop: 12, height: 6, borderRadius: 3, background: "rgba(255,255,255,.05)", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: (totalScore * 10) + "%", borderRadius: 3, background: "linear-gradient(90deg," + verdict.color + "88," + verdict.color + ")", animation: "bG 1s ease-out" }} />
                  </div>
                  <div style={{ fontFamily: "'DM Sans'", fontSize: 13, fontWeight: 600, color: verdict.color, marginTop: 10, letterSpacing: ".05em" }}>{verdict.classification}</div>
                </div>

                <p style={{ fontFamily: "'DM Sans'", fontSize: 14.5, lineHeight: 1.7, color: "rgba(228,222,212,.6)", textAlign: "center", maxWidth: 460, margin: "0 auto" }}>{verdict.desc}</p>

                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <h3 style={{ fontFamily: "'DM Sans'", fontSize: 11, fontWeight: 600, color: "rgba(200,170,120,.45)", letterSpacing: ".15em", textTransform: "uppercase", marginBottom: 2 }}>Desempenho por cenario</h3>
                  {answers.map(function(a, i) {
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, background: "rgba(255,255,255,.015)", border: "1px solid rgba(255,255,255,.04)" }}>
                        <span style={{ fontSize: 18 }}>{questions[i].icon}</span>
                        <span style={{ fontFamily: "'DM Sans'", fontSize: 12.5, color: "rgba(228,222,212,.55)", flex: 1 }}>{questions[i].scenario}</span>
                        <span style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, fontWeight: 700, color: a.score >= 8 ? "#10b981" : a.score >= 5 ? "#f59e0b" : "#ef4444" }}>{a.score}</span>
                      </div>
                    );
                  })}
                </div>

                <div style={{ padding: "16px 18px", borderRadius: 14, background: "rgba(200,170,120,.03)", border: "1px solid rgba(200,170,120,.1)" }}>
                  <h3 style={{ fontFamily: "'DM Sans'", fontSize: 11, fontWeight: 600, color: "rgba(200,170,120,.5)", letterSpacing: ".12em", textTransform: "uppercase", marginBottom: 10 }}>Perfil Comportamental</h3>
                  {verdict.traits.map(function(t, i) {
                    return (
                      <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8 }}>
                        <span style={{ color: "#c8aa78", fontSize: 8, marginTop: 5 }}>{"\u25C6"}</span>
                        <span style={{ fontFamily: "'DM Sans'", fontSize: 13, lineHeight: 1.55, color: "rgba(228,222,212,.6)" }}>{t}</span>
                      </div>
                    );
                  })}
                </div>

                <div style={{ textAlign: "center", padding: "22px 18px", borderRadius: 16, border: "1.5px dashed rgba(200,170,120,.25)", background: "linear-gradient(135deg,rgba(200,170,120,.04),rgba(200,170,120,.01))" }}>
                  <div style={{ fontSize: 36, marginBottom: 8 }}>{"\u{1F4DC}"}</div>
                  <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 20, fontWeight: 700, color: "#c8aa78", marginBottom: 6 }}>Certificado Oficial</div>
                  <p style={{ fontFamily: "'DM Sans'", fontSize: 13, lineHeight: 1.6, color: "rgba(228,222,212,.5)", marginBottom: 16, maxWidth: 380, margin: "0 auto 16px" }}>
                    Baixe seu certificado profissional de avaliacao comportamental com selo, codigo de validacao e analise completa do perfil.
                  </p>
                  <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap", marginBottom: 16 }}>
                    <span style={{ fontFamily: "'DM Sans'", fontSize: 10, padding: "5px 12px", borderRadius: 20, background: "rgba(200,170,120,.08)", color: "rgba(200,170,120,.6)", border: "1px solid rgba(200,170,120,.12)" }}>{"\u{1F4C5}"} {fmtDate()}</span>
                    <span style={{ fontFamily: "'DM Sans'", fontSize: 10, padding: "5px 12px", borderRadius: 20, background: "rgba(200,170,120,.08)", color: "rgba(200,170,120,.6)", border: "1px solid rgba(200,170,120,.12)" }}>{"\u{1F511}"} {validationCode}</span>
                  </div>
                  <button className="pb" onClick={generateCertificate} disabled={generatingPdf} style={{ animation: !generatingPdf ? "pulse 2s infinite" : "none", fontSize: 16, padding: "16px 48px" }}>
                    {generatingPdf ? (
                      <React.Fragment><span style={{ width: 18, height: 18, border: "2.5px solid rgba(10,10,15,.3)", borderTopColor: "#0a0a0f", borderRadius: "50%", animation: "sp .8s linear infinite", display: "inline-block" }} /> GERANDO...</React.Fragment>
                    ) : "\u{1F4E5} BAIXAR CERTIFICADO"}
                  </button>
                </div>

                <div style={{ textAlign: "center", marginTop: 6 }}>
                  <button className="gb" onClick={restart}>{"\u{1F504}"} REFAZER TESTE</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<IntegrityTest />);
  </script>
</body>
</html>
